# Apply in nginx server block (or http context if no server-level add_header exists).
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://maps.gstatic.com https://maps.googleapis.com; frame-src https://beds24.com https://www.beds24.com https://maps.google.com https://www.google.com; connect-src 'self' https://restaurante.portadirta.com https://eventos.portadirta.com https://beds24.com https://maps.googleapis.com; object-src 'none'; base-uri 'self'" always;
