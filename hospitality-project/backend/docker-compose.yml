services:
  restaurant:
    build:
      context: ./tastyigniter
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - restaurant-db
    restart: always

  restaurant-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: tastyigniter
      MYSQL_USER: tasty
      MYSQL_PASSWORD: tasty_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - ./data/mysql:/var/lib/mysql
    restart: always

  events:
    build:
      context: ./hi.events
      dockerfile: Dockerfile.all-in-one
    ports:
      - "8082:80"
    environment:
      VITE_API_URL_CLIENT: https://events.hobbitonranch.com/api
      VITE_FRONTEND_URL: https://events.hobbitonranch.com
      VITE_STRIPE_PUBLISHABLE_KEY: ""
    volumes:
      - ./hi.events/backend/.env:/app/backend/.env
    depends_on:
      - events-db
    restart: always

  events-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hievents
      POSTGRES_USER: hievents
      POSTGRES_PASSWORD: hievents_pass
    volumes:
      - ./data/pgsql:/var/lib/postgresql/data
    restart: always

  n8n-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n_pass
      POSTGRES_DB: n8n
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: always

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=n8n-db
      - DB_POSTGRESDB_PASSWORD=n8n_pass
      - DB_POSTGRESDB_USER=n8n
    depends_on:
      - n8n-db
    restart: always
